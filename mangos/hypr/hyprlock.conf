$Scripts = $HOME/.config/hypr/scripts
source = ~/.cache/wal/colors-hyprlock.conf

background {
    path = $wallpaper
    blur_passes = 2
    blur_size = 5
    brightness = 0.6
}

# Outer card
shape {
    monitor = DP-1
    size = 280, 125
    color = $surface
    border_color = $accent
    border_size = 2
    rounding = 0
    position = 0, 24
    halign = center
    valign = center
}

# Username row background
shape {
    monitor = DP-1
    size = 240, 40
    color = $surface
    rounding = 4
    position = 0, 50
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text =  $USER
    color = $foreground
    font_size = 11
    font_family = JetBrainsMono Nerd Font Bold
    position = -1, 51
    halign = center
    valign = center
}

# Password Input (The SDDM Card Field)
input-field {
    monitor = DP-1
    size = 240, 35
    outline_thickness = 1
    dots_size = 0.16
    dots_spacing = 0.4
    outer_color = $accent
    inner_color = $surface
    font_color = $foreground
    font_family = JetBrainsMono Nerd Font Regular
    fade_on_empty = false
    placeholder_text = <i>パスワード</i>
    hide_input = false
    check_color = $accent2
    fail_color = $accent2
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $accent
    rounding = 0
    position = 0, 0
    halign = center
    valign = center
}

# Album Art
image {
    monitor = DP-1
    path = $HOME/.config/hypr/scripts/music.webp
    size = 100
    rounding = 4
    border_size = 2
    border_color = $accent
    rotate = 0
    reload_time = 2
    reload_cmd = ~/.config/hypr/scripts/hyprlock-music.sh --art
    position = 0, 150
    halign = center
    valign = bottom
    zindex = 1
}

# Song title
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --title)"
    color = $foreground
    font_size = 14
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 113
    halign = center
    valign = bottom
    zindex = 1
}

# Artist name
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --artist)"
    color = $foreground
    font_size = 12
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 93
    halign = center
    valign = bottom
    zindex = 1
}

# Previous track button
label {
    monitor = DP-1
    text = 󰒮
    color = $foreground
    font_size = 25
    onclick = playerctl -p mpd previous
    position = -55, 30
    halign = center
    valign = bottom
}

# Play/Pause button
label {
    monitor = DP-1
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --status
    color = $foreground
    font_size = 25
    onclick = playerctl -p mpd play-pause
    position = 0, 30
    halign = center
    valign = bottom
}

# Next track button
label {
    monitor = DP-1
    text = 󰒭
    color = $foreground
    font_size = 25
    onclick = playerctl -p mpd next
    position = 55, 30
    halign = center
    valign = bottom
}

# Current position timestamp
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --position)"
    color = $foreground
    font_size = 9
    font_family = JetBrains Mono Nerd Font bold
    position = -110, 73
    halign = center
    valign = bottom
}

# Total length timestamp
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock-music.sh --length)"
    color = $foreground
    font_size = 9
    font_family = JetBrains Mono Nerd Font bold
    position = 110, 73
    halign = center
    valign = bottom
}

# Progress bar (with Pango markup for colored segments)
label {
    monitor = DP-1
    text = cmd[update:1000] ~/.config/hypr/scripts/hyprlock-music.sh --progress-bar
    color = $foreground
    font_size = 12
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 71
    halign = center
    valign = bottom
}
