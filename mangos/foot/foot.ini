[main]
include=~/.cache/wal/colors-foot.ini

font=JetBrainsMono NerdFont:size=11
font-bold=JetBrainsMono NerdFont:weight=bold:size=11
underline-offset=1.5
pad=0x0
letter-spacing=-1px

[colors-dark]
alpha=0.77
cursor=1d1d1d c0c8d8

[scrollback]
lines=999

[url]
launch=xdg-open ${url}

[mouse]
hide-when-typing=yes
