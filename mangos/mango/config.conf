# Auto Start
exec-once = sh -c 'ydotool mousemove --absolute 2326 540'
exec-once = awww-daemon
exec-once = waybar
exec-once = swaync
exec-once = ~/.config/mango/scripts/gtk.sh
exec-once = ~/.config/mango/scripts/usb-sound.sh
exec-once = ~/.config/mango/scripts/chime.sh
exec-once = hypridle
exec-once = sleep 1 && ~/.local/bin/update/updates.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Window Rules
windowrule=isfloating:1,width:860,height:600,title:foot
windowrule=isfloating:1,width:1600,height:900,appid:quodlibet
windowrule=isfloating:1,width:1400,height:860,title:Vesktop
windowrule=isfloating:1,width:272,height:372,offsetx:1436,offsety:-100,title:calcurse
windowrule=isfloating:1,width:800,height:300,offsetx:0,offsety:-100,title:pulsemixer
windowrule=isfloating:1,width:1000,height:666,appid:pavucontrol
windowrule=isfloating:1,width:1000,height:700,title:Music Search
windowrule=idleinhibit_when_focus:1,appid:zen

# Monitors
monitorrule=name:DP-1,width:1920,height:1080,refresh:144,x:1366,y:0,scale:1
monitorrule=name:HDMI-A-1,width:1366,height:768,refresh:60,x:0,y:0,scale:1

# Keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us

# Mouse
mouse_natural_scrolling=0
mouse_accel_profile=0
mouse_accel_speed=0

# Cursor
cursor_size=16
cursor_theme=WinSur-dark-cursors

# Animations
animations=1
layer_animations=0
animation_type_open=fade
animation_type_close=fade
animation_fade_in=0
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.6
zoom_end_ratio=0.6
fadein_begin_opacity=0.1
fadeout_begin_opacity=0.5
animation_duration_move=300
animation_duration_open=500
animation_duration_tag=350
animation_duration_close=450
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Window Appearance
gappih=0
gappiv=0
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=0

# Scroller Layout
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master Layout
new_is_master=1
default_mfact=0.5
default_nmaster=1
smartgaps=0

dwindle_manual_split=1

# Overview
hotarea_size=0
enable_hotarea=0
ov_tab_mode=0
overviewgappi=0
overviewgappo=0

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
ocus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=0
focus_cross_monitor=1
focus_cross_tag=1
enable_floating_snap=0
snap_distance=30
drag_tile_to_tile=1
dropcolor=0x0f132477

# Tag Rules
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Exclusive Binds - Move Floating Window
bind=CTRL+SHIFT,Up,movewin,+0,-20
bind=CTRL+SHIFT,Down,movewin,+0,+20
bind=CTRL+SHIFT,Left,movewin,-20,+0
bind=CTRL+SHIFT,Right,movewin,+20,+0

# Resize
bind=CTRL+ALT,Up,resizewin,+0,-20
bind=CTRL+ALT,Down,resizewin,+0,+20
bind=CTRL+ALT,Left,resizewin,-20,+0
bind=CTRL+ALT,Right,resizewin,+20,+0

bind=ALT+SHIFT,Left,focusmon,left
bind=ALT+SHIFT,Right,focusmon,right
bind=ALT+CTRL,q,spawn,zen-browser

# Media / Hardware Keys
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.0
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous

source = ~/.config/mango/superbinds.conf
